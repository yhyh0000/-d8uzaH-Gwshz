name: Free Node Tester

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-nodes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests pyyaml

      # 1. 自动下载并安装 xray-knife
      - name: Install xray-knife
        run: |
          wget -q https://github.com/lilendian0x00/xray-knife/releases/latest/download/Xray-knife-linux-64.zip
          unzip -o Xray-knife-linux-64.zip
          chmod +x xray-knife
          sudo mv xray-knife /usr/local/bin/
          rm Xray-knife-linux-64.zip

      # 2. 运行采集与测试
      - name: Fetch nodes
        run: python fetch.py

      - name: Test nodes and generate subscribe
        run: python tester.py

      # 3. 提交结果
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/valid.txt data/valid_raw.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update valid nodes [skip ci]"
          git push
